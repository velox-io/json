[build]
# Ensure no_std: no platform-specific unwinding or stdlib linkage.
# -C relocation-model=pic: required for prelink (link as shared lib first).
rustflags = ["-C", "relocation-model=pic"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "relocation-model=pic", "-C", "target-feature=+neon"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "relocation-model=pic", "-C", "target-feature=+sse4.2"]
