version: "2"
run:
  tests: true
linters:
  enable:
  - gosec
  - misspell
  - revive
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    gosec:
      excludes:
      - G104
      - G304
      - G115
    govet:
      disable:
      - fieldalignment
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
  exclusions:
    generated: lax
    presets:
    - comments
    - common-false-positives
    - legacy
    - std-error-handling
    rules:
    - linters:
      - errcheck
      - gosec
      path: _test\.go
    - linters:
      - gosec
      path: benchmark/
    - linters:
      - gosec
      text: 'G103:'
    - linters:
      - errcheck
      text: type assertion
    - linters:
      - staticcheck
      text: 'SA5008:.*(unknown JSON option "copy"|unknown `copy` tag option)'
    - linters:
      - unused
      text: 'field _'
      path: ndec/ndec\.go
    - linters:
      - govet
      - staticcheck
      path: gort/noescape\.go
      text: 'possible misuse of unsafe.Pointer|SA4016'
    paths:
    - third_party$
    - builtin$
    - examples$
    - local
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
  - gofmt
  - goimports
  exclusions:
    generated: lax
    paths:
    - third_party$
    - builtin$
    - examples$
