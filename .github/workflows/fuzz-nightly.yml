name: Fuzz (Nightly)

on:
  schedule:
    # Run every day at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: 'Fuzz duration per target (e.g. 5m, 10m)'
        required: false
        default: '5m'

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzMarshalString
          - FuzzMarshalStruct
          - FuzzMarshalNoCrash
          - FuzzUnmarshalAny
          - FuzzUnmarshalStruct
          - FuzzUnmarshalNested
          - FuzzNoCrash
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Restore fuzz corpus cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/go-build/fuzz
        key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
        restore-keys: |
          fuzz-corpus-${{ matrix.target }}-
          fuzz-corpus-

    - name: Run ${{ matrix.target }}
      run: |
        FUZZ_TIME="${{ github.event.inputs.fuzz-time || '5m' }}"
        echo "Running ${{ matrix.target }} for ${FUZZ_TIME}"
        go test -fuzz=${{ matrix.target }} -fuzztime=${FUZZ_TIME} .

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: fuzz-crash-${{ matrix.target }}
        path: testdata/fuzz/${{ matrix.target }}/
        retention-days: 30
