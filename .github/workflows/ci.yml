name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', 'stable']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Print Go version
      run: go version

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic .

    - name: Upload coverage report
      if: matrix.go-version == 'stable'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: stable

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

  build:
    name: Build (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', 'stable']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build
      run: go build .

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: stable

    - name: Restore fuzz cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/go-build/fuzz
        key: fuzz-corpus-${{ github.sha }}
        restore-keys: |
          fuzz-corpus-

    - name: Run FuzzUnmarshalAny
      run: go test -fuzz=FuzzUnmarshalAny -fuzztime=30s .

    - name: Run FuzzUnmarshalStruct
      run: go test -fuzz=FuzzUnmarshalStruct -fuzztime=30s .

    - name: Run FuzzUnmarshalNested
      run: go test -fuzz=FuzzUnmarshalNested -fuzztime=30s .

    - name: Run FuzzNoCrash
      run: go test -fuzz=FuzzNoCrash -fuzztime=30s .

  pr-check:
    name: PR Check
    runs-on: ubuntu-latest
    needs: [test, lint, build, fuzz]
    if: always() && github.event_name == 'pull_request'
    steps:
    - name: Check all jobs passed
      run: |
        if [[ "${{ needs.test.result }}" != "success" || \
              "${{ needs.lint.result }}" != "success" || \
              "${{ needs.build.result }}" != "success" || \
              "${{ needs.fuzz.result }}" != "success" ]]; then
          echo "::error::PR checks failed. All tests, lint, build, and fuzz must pass before merging."
          exit 1
        fi
        echo "All PR checks passed!"
