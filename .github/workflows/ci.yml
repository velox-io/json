name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-linux-amd64:
    name: Test (Linux AMD64, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', '1.25', 'stable']
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Print Go version
      run: go version

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: make test

  test-linux-arm64:
    name: Test (Linux ARM64, Go stable)
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Print Go version
      run: go version

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: make test

  test-macos:
    name: Test (macOS, Go stable)
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Print Go version
      run: go version

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: make test

  test-windows:
    name: Test (Windows, Go ${{ matrix.go-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', '1.25', 'stable']
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Print Go version
      run: go version

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: .\scripts\run-test.ps1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - FuzzMarshalString
        - FuzzMarshalStruct
        - FuzzMarshalNoCrash
        - FuzzUnmarshalAny
        - FuzzUnmarshalStruct
        - FuzzUnmarshalNested
        - FuzzNoCrash
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Restore fuzz cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/go-build/fuzz
        key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
        restore-keys: |
          fuzz-corpus-${{ matrix.target }}-

    - name: Run ${{ matrix.target }}
      run: go test -fuzz=${{ matrix.target }} -fuzztime=5m -timeout=10m .

  pr-check:
    name: PR Check
    runs-on: ubuntu-latest
    needs: [test-linux-amd64, test-linux-arm64, test-macos, test-windows, lint, fuzz]
    if: always() && github.event_name == 'pull_request'
    steps:
    - name: Check all jobs passed
      run: |
        if [[ "${{ needs.test-linux-amd64.result }}" != "success" || \
              "${{ needs.test-linux-arm64.result }}" != "success" || \
              "${{ needs.test-macos.result }}" != "success" || \
              "${{ needs.test-windows.result }}" != "success" || \
              "${{ needs.lint.result }}" != "success" || \
              "${{ needs.fuzz.result }}" != "success" ]]; then
          echo "::error::PR checks failed. All tests, lint, and fuzz must pass before merging."
          exit 1
        fi
        echo "All PR checks passed!"
