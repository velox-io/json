name: Performance Regression Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'Baseline git ref (commit/tag/branch) to compare against'
        required: false
        default: 'main'

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  BENCH_COUNT: 5
  # Fixed baseline ref for comparison. Update this when establishing a new
  # performance baseline (e.g. after a release or intentional perf change).
  BENCH_BASELINE_REF: 'v0.1.2'

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout current code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0  # full history for checkout of baseline

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest

    - name: Determine baseline ref
      id: baseline
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.baseline_ref }}" ]; then
          echo "ref=${{ github.event.inputs.baseline_ref }}" >> $GITHUB_OUTPUT
        else
          echo "ref=${{ env.BENCH_BASELINE_REF }}" >> $GITHUB_OUTPUT
        fi

    - name: Run baseline benchmarks
      run: |
        BASELINE_REF="${{ steps.baseline.outputs.ref }}"
        echo "Baseline ref: $BASELINE_REF"

        # Save current HEAD
        CURRENT_SHA=$(git rev-parse HEAD)

        # Checkout baseline
        git checkout "$BASELINE_REF" --quiet

        # Run baseline benchmarks
        cd benchmark && go test -bench="Velox" -benchmem -count=${{ env.BENCH_COUNT }} . | tee bench-baseline.txt
        cd ..

        # Return to current commit
        git checkout "$CURRENT_SHA" --quiet

    - name: Run current benchmarks
      run: |
        cd benchmark && go test -bench="Velox" -benchmem -count=${{ env.BENCH_COUNT }} . | tee bench-current.txt

    - name: Compare results
      id: compare
      run: |
        echo "=== Performance Comparison ===" >> $GITHUB_STEP_SUMMARY
        benchstat benchmark/bench-baseline.txt benchmark/bench-current.txt | tee benchmark/comparison.txt >> $GITHUB_STEP_SUMMARY || true

        # Detect significant regressions (>10% slower).
        #
        # benchstat groups output by metric with header lines like:
        #   │ sec/op │   — latency:    + means SLOWER  (regression)
        #   │ B/op   │   — memory:     + means MORE    (regression)
        #   │ allocs │   — allocs:     + means MORE    (regression)
        #   │ B/s    │   — throughput: + means FASTER  (improvement, NOT regression)
        #
        # We track the current section and only flag +XX% as regression in
        # sec/op, B/op, and allocs/op sections.
        REGRESSION_DETECTED=0
        SECTION="unknown"
        while IFS= read -r line; do
          # Detect section headers (benchstat v2 format: │ sec/op │, │ B/op │, etc.)
          if echo "$line" | grep -qE '│\s*sec/op\s*│'; then
            SECTION="latency"
          elif echo "$line" | grep -qE '│\s*B/op\s*│'; then
            SECTION="memory"
          elif echo "$line" | grep -qE '│\s*allocs/op\s*│'; then
            SECTION="allocs"
          elif echo "$line" | grep -qE '│\s*[KMGTkmgt]?i?B/s\s*│'; then
            SECTION="throughput"
          fi

          # Only flag +XX% as regression in non-throughput sections
          if [ "$SECTION" = "throughput" ] || [ "$SECTION" = "unknown" ]; then
            continue
          fi

          if echo "$line" | grep -qE '\+[0-9]+\.[0-9]+%'; then
            percent=$(echo "$line" | grep -oE '\+[0-9]+\.[0-9]+%' | tr -d '+%')
            if [ -n "$percent" ] && [ $(echo "$percent > 10" | bc -l) -eq 1 ]; then
              echo "::warning::Significant regression detected ($SECTION): $line"
              REGRESSION_DETECTED=1
            fi
          fi
        done < benchmark/comparison.txt

        if [ $REGRESSION_DETECTED -eq 1 ]; then
          echo "regression_detected=true" >> $GITHUB_OUTPUT
        fi

    - name: Fail on significant regression
      if: steps.compare.outputs.regression_detected == 'true'
      run: |
        echo "::error::Performance regression detected (>10% slower). Please review the benchmark comparison above."
        exit 1

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark/*.txt
        retention-days: 30
